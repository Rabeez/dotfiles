# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_mocha"

format = '''
[Ôò¡ÔöÇ](bold green) $all
[Ôò░](bold green)$character'''

# Inserts a blank line between shell prompts
add_newline = true

# Some language version commands were taking longer to fill prompt modules
command_timeout = 1000

# Replace the 'ÔØ»' symbol in the prompt with 'Ô×£'
# [character] # The name of the module we are configuring is 'character'
# success_symbol = '[Ô×£](bold green)' # The 'success_symbol' segment is being set to 'Ô×£' with the color 'bold green'
# error_symbol = "[Ô£û](bold red)"

# Controls line break between multi-line custom prompts
[line_break]
disabled = true

# Module overrides
[bun]
symbol = "¯Ø» "

[character]
vimcmd_symbol = "[ÔØ«](bold blue)"
vimcmd_visual_symbol = "[ÔØ«](bold mauve)"

[c]
symbol = "¯ÿ× "

[cpp]
symbol = "¯ÿØ "

[cmake]
symbol = "¯×ö "

[directory]
truncation_length = 4
read_only = " ¾░î¥"

[docker_context]
symbol = "´îê "

[git_branch]
symbol = "´Éÿ "

[git_status]
disabled = true

[golang]
symbol = "¯ÿº "

[hostname]
ssh_symbol = "¯¼ü "

[lua]
symbol = "¯ÿá "

[nodejs]
symbol = '¯┤ì '

[os.symbols]
Macos = "´îé "

[package]
disabled = true

[pixi]
symbol = " "
format = 'via [$symbol($version )]($style)[(\(env: $environment\) )](bold red)'

[python]
symbol = "¯êÁ "
style = "green"
detect_files = [
  '.python-version',
  'Pipfile',
  '__init__.py',
  'pyproject.toml',
  'requirements.txt',
  'setup.py',
  'tox.ini',
  "pixi.toml",
]
# customize python binary path for pixi
python_binary = [
  # this is the python from PATH if in a pixi shell
  # (assuming you don't have python on your global PATH)
  "python",
  # fall back to pixi's python if it's available
  ".pixi/envs/default/bin/python",
]

[rust]
symbol = "¾▒ÿù "

[zig]
symbol = "¯ú»´©Å "

