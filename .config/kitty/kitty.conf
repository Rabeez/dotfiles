# vim:fileencoding=utf-8:foldmethod=marker

# Theme
include themes/catppuccin-mocha.conf

# Font
font_family Maple Mono NF Medium
font_size 16
adjust_line_height 110%

# Window
background_opacity 0.8
background_blur 20
hide_window_decorations titlebar-only
remember_window_size no
initial_window_width 10000
initial_window_height 10000
confirm_os_window_close 0
mouse_hide_wait -1
window_padding_width 0
placement_strategy center

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Shell
shell /bin/zsh --login
shell_integration enabled

# Bell
enable_audio_bell no

# macOS
macos_option_as_alt left

# Layouts
enabled_layouts splits,stack

# Tab bar
tab_bar_edge top
tab_bar_style custom
tab_powerline_style round
tab_bar_min_tabs 1
tab_activity_symbol none
tab_title_template "{index}{' 󰋲 ' if layout_name == 'stack' and num_windows > 1 else ''}"

# Keymaps — native tabs (cmd, macOS style)
map cmd+t new_tab
map cmd+w close_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab

# Zoom current window (like tmux zoom)
map cmd+z toggle_layout stack

# Clear terminal
map cmd+l clear_terminal scrollback active

# Splits — Ctrl+a leader
map ctrl+a>h launch --location=vsplit --cwd=current
map ctrl+a>v launch --location=hsplit --cwd=current
map ctrl+a>x close_window

# Move focus between splits
map ctrl+h neighboring_window left
map ctrl+j neighboring_window bottom
map ctrl+k neighboring_window top
map ctrl+l neighboring_window right

# Resize splits
map ctrl+a>shift+h resize_window narrower 4
map ctrl+a>shift+l resize_window wider 4
map ctrl+a>shift+j resize_window taller 4
map ctrl+a>shift+k resize_window shorter 4
